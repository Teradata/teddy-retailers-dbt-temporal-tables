version: 2

models:
  - name: stg_customers
    config:
      contract:
        enforced: true
    columns:
      - name: customer_id
        data_type: smallint
        constraints:
          - type: not_null
      - name: first_name
        data_type: char
      - name: last_name
        data_type: char
      - name: email
        data_type: char
   
  - name: stg_orders
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
    
  - name: stg_products
    config:
      contract:
        enforced: true
    columns:
      - name: product_id
        data_type: smallint
        constraints:
          - type: not_null
      - name: product_name
        data_type: char
      - name: product_category
        data_type: char
      - name: price_dollars
        data_type: smallint
    
  - name: stg_order_products
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
